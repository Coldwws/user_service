version: "3.9"

volumes:
  postgres_volume_local:
  prometheus_data:

services:
  pg_local:
    image: postgres:14-alpine3.17
    env_file:
      - docker.env
    ports:
      - "54321:5432"
    volumes:
      - "postgres_volume_local:/var/lib/postgresql/data"


  migrator:
    build:
      context: .
      dockerfile: migration.Dockerfile
    env_file:
      - docker.env
    environment:
      - PG_HOST=pg_local
    depends_on:
      - pg_local
    restart: on-failure
    

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - docker.env
    depends_on:
      - pg_local
      - migrator
    ports:
      - "50051:50051"
      - "8081:8081"
      - "8090:8090"
      - "2112:2112"
    volumes:
      - ./cert:/cert

  prometheus:
    image: prom/prometheus:v2.37.9
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus